services:
  agent-laboratory:
    build: .
    container_name: agent-laboratory
    volumes:
      - .:/app
    command: >
      python ai_lab_repo.py
      --deepseek-api-key $API_KEY
      --llm-backend $LLM_BACKEND
      --compile-latex $COMPILE_LATEX
      --copilot-mode $COPILOT_MODE
      --config-path $CONFIG_PATH
